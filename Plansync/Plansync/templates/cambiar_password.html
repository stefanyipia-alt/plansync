<!DOCTYPE html>
<html>
<head>

    <title>Cambiar contraseña</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- ICONOS -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background:
            linear-gradient(
                135deg,
                #0f2027,
                #203a43,
                #2c5364
            );

            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {

            background: white;

            padding: 40px;

            border-radius: 20px;

            width: 100%;

            max-width: 430px;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.2);
        }

        .form-control {

            border-radius: 12px;

            padding: 12px;
        }

        .btn-custom {

            border-radius: 12px;

            padding: 12px;

            font-weight: 600;
        }

        .error {

            color: red;

            font-size: 14px;
        }

        .strength {

            font-size: 14px;

            font-weight: 600;
        }

    </style>

</head>

<body>

<div class="card-box">

    <h2 class="text-center mb-4">

        Cambiar contraseña

    </h2>

    <!-- MENSAJE FLASK -->

    {% if mensaje %}

    <div class="alert alert-danger">

        {{ mensaje }}

    </div>

    {% endif %}

    <!-- FORMULARIO -->

    <form
        method="POST"
        onsubmit="return validarFormulario()"
    >

        <!-- EMAIL -->

        <input
            type="email"
            name="email"
            id="email"
            class="form-control mb-3"
            placeholder="Correo electrónico"
        >

        <!-- NUEVA PASSWORD -->

        <input
            type="password"
            name="nueva"
            id="password"
            class="form-control mb-2"
            placeholder="Nueva contraseña"
            onkeyup="verificarPassword()"
        >

        <!-- CALIDAD -->

        <div id="strengthText"
             class="strength mb-3">

        </div>

        <!-- CONFIRMAR -->

        <input
            type="password"
            name="confirmar"
            id="confirmar"
            class="form-control mb-3"
            placeholder="Confirmar contraseña"
        >

        <!-- ERROR -->

        <div
            id="mensajeError"
            class="error mb-3"
        ></div>

        <!-- REQUISITOS -->

        <div class="mb-3"
             style="font-size:14px;">

            <b>La contraseña debe tener:</b>

            <ul>

                <li>Mayúsculas</li>

                <li>Minúsculas</li>

                <li>Números</li>

                <li>Signos especiales</li>

                <li>Sin espacios</li>

            </ul>

        </div>

        <!-- BOTÓN -->

        <button class="btn btn-primary w-100 btn-custom">

            <i class="fa-solid fa-key"></i>

            Cambiar contraseña

        </button>

    </form>

    <!-- VOLVER -->

    <div class="text-center mt-3">

        <a href="/login">

            Volver al login

        </a>

    </div>

</div>

<!-- JAVASCRIPT -->

<script>

function verificarPassword() {

    let password = document.getElementById("password").value;

    let fuerza = document.getElementById("strengthText");

    let regexMayus = /[A-Z]/;

    let regexMinus = /[a-z]/;

    let regexNumero = /[0-9]/;

    let regexSigno = /[!@#$%^&*(),.?":{}|<>]/;

    let regexEspacio = /\s/;

    let nivel = 0;

    if(regexMayus.test(password)) nivel++;

    if(regexMinus.test(password)) nivel++;

    if(regexNumero.test(password)) nivel++;

    if(regexSigno.test(password)) nivel++;

    if(regexEspacio.test(password)) {

        fuerza.innerHTML =
        "❌ La contraseña no puede tener espacios";

        fuerza.style.color = "red";

        return;
    }

    if(password.length < 6) {

        fuerza.innerHTML =
        "❌ Contraseña muy corta";

        fuerza.style.color = "red";

    }

    else if(nivel <= 2) {

        fuerza.innerHTML =
        "⚠️ Seguridad: Débil";

        fuerza.style.color = "orange";
    }

    else if(nivel == 3) {

        fuerza.innerHTML =
        "✅ Seguridad: Buena";

        fuerza.style.color = "#d97706";
    }

    else {

        fuerza.innerHTML =
        "🔒 Seguridad: Segura";

        fuerza.style.color = "green";
    }
}

function validarFormulario() {

    let email =
    document.getElementById("email").value.trim();

    let password =
    document.getElementById("password").value;

    let confirmar =
    document.getElementById("confirmar").value;

    let error =
    document.getElementById("mensajeError");

    error.innerHTML = "";

    // CAMPOS VACÍOS

    if(
        email == "" ||
        password == "" ||
        confirmar == ""
    ) {

        error.innerHTML =
        "Todos los campos son obligatorios";

        return false;
    }

    // ESPACIOS

    if(password.includes(" ")) {

        error.innerHTML =
        "La contraseña no puede contener espacios";

        return false;
    }

    // MAYÚSCULA

    if(!/[A-Z]/.test(password)) {

        error.innerHTML =
        "Debe contener una letra mayúscula";

        return false;
    }

    // MINÚSCULA

    if(!/[a-z]/.test(password)) {

        error.innerHTML =
        "Debe contener una letra minúscula";

        return false;
    }

    // NÚMERO

    if(!/[0-9]/.test(password)) {

        error.innerHTML =
        "Debe contener un número";

        return false;
    }

    // SIGNO

    if(!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {

        error.innerHTML =
        "Debe contener un signo especial";

        return false;
    }

    // LONGITUD

    if(password.length < 8) {

        error.innerHTML =
        "Debe tener mínimo 8 caracteres";

        return false;
    }

    // CONFIRMACIÓN

    if(password != confirmar) {

        error.innerHTML =
        "Las contraseñas no coinciden";

        return false;
    }

    return true;
}

</script>

</body>
</html>

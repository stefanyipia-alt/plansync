<!DOCTYPE html>
<html>
<head>
    <title>PlanSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: white;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .btn-custom {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        img {
            max-width: 180px;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- LOGO -->
    <img src="{{ url_for('static', filename='img/logo.png') }}" class="mb-4">

    <!-- TEXTO -->
    <h3>Bienvenido a PlanSync</h3>
    <p class="text-muted">Gestiona contactos, tareas y reuniones fácilmente</p>

    <!-- BOTONES -->
    <a href="/login" class="btn btn-primary btn-custom">Iniciar sesión</a>
    <a href="/register" class="btn btn-outline-success btn-custom">Registrarse</a>

</div>

</body>
</html>

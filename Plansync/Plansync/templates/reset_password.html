<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Nueva contraseña
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    >

    <style>

        body{

            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        }

        .card-reset{

            width:430px;
            background:white;
            padding:40px;
            border-radius:22px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        .logo{

            text-align:center;
            margin-bottom:25px;
        }

        .logo img{

            width:210px;
        }

        h2{

            text-align:center;
            margin-bottom:30px;
            color:#0b1b4d;
            font-weight:bold;
        }

        .form-control{

            height:50px;
            border-radius:12px;
            margin-bottom:20px;
        }

        .btn-reset{

            width:100%;
            height:50px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:16px;
            font-weight:600;
        }

        .btn-reset:hover{

            background:#1d4ed8;
        }

        .info{

            text-align:center;
            color:#64748b;
            font-size:14px;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="card-reset">

    <!-- LOGO -->

    <div class="logo">

        <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        >

    </div>

    <!-- TITULO -->

    <h2>
        Crear nueva contraseña
    </h2>

    <!-- FORM -->

    <form method="POST">

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Nueva contraseña"
            required
        >

        <button
            type="submit"
            class="btn-reset"
        >

            Actualizar contraseña

        </button>

    </form>

    <div class="info">

        El enlace expira en 15 minutos

    </div>

</div>

</body>
</html>

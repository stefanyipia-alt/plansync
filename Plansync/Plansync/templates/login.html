<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- ICONOS -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body {

            height: 100vh;

            background:
            linear-gradient(
                135deg,
                #0f2027,
                #203a43,
                #2c5364
            );

            display: flex;

            align-items: center;

            justify-content: center;

            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {

            background: white;

            padding: 40px;

            border-radius: 20px;

            width: 100%;

            max-width: 420px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.2);
        }

        .form-control {

            border-radius: 10px;

            padding: 12px;
        }

        .btn-login {

            border-radius: 10px;

            padding: 12px;

            font-weight: 600;
        }

        img {

            max-width: 160px;
        }

        .error-box {

            background: #fee2e2;

            color: #991b1b;

            padding: 12px;

            border-radius: 10px;

            margin-bottom: 20px;

            font-size: 14px;
        }

    </style>

</head>

<body>

<div class="login-card text-center">

    <!-- LOGO -->

    <img src="{{ url_for('static', filename='img/logo.png') }}"
         class="mb-4">

    <h3 class="mb-3">

        Iniciar sesión

    </h3>

    <!-- MENSAJE ERROR -->

    {% if error %}

    <div class="error-box">

        <i class="fa-solid fa-circle-exclamation"></i>

        {{ error }}

    </div>

    {% endif %}

    <form method="POST">

    <!-- EMAIL -->

    <input
        class="form-control mb-3"
        name="email"
        placeholder="Correo electrónico"
        required
    >

    <!-- PASSWORD -->

    <input
        class="form-control mb-2"
        type="password"
        name="password"
        placeholder="Contraseña"
        required
    >

    <!-- RECUPERAR -->

    <div class="text-end mb-3">

        <a href="/recuperar">
      ¿Olvidaste tu contraseña?
        </a>

    </div>

    <!-- BOTÓN LOGIN -->

    <button class="btn btn-primary w-100 btn-login">

        <i class="fa-solid fa-right-to-bracket"></i>

        Ingresar

    </button>

</form>

    <p class="mt-3">

        ¿No tienes cuenta?

        <a href="/register">

            Regístrate

        </a>

    </p>

</div>

</body>
</html>
